<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JARVIS" />
  <meta name="theme-color" content="#0a0e17" />
  <title>JARVIS Remote</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="stylesheet" href="/static/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <!-- 3D Canvas Background -->
  <canvas id="bg-canvas"></canvas>

  <!-- PAIR SCREEN -->
  <div id="pair-screen" class="screen active">
    <div class="pair-card glass-panel">
      <div class="logo-ring">
        <svg viewBox="0 0 60 60" width="60" height="60">
          <circle cx="30" cy="30" r="28" fill="none" stroke="#2792ff" stroke-width="2" stroke-dasharray="4 3"/>
          <circle cx="30" cy="30" r="18" fill="none" stroke="#00d2fd" stroke-width="1.5"/>
          <circle cx="30" cy="30" r="6" fill="#2792ff"/>
        </svg>
      </div>
      <h1 class="pair-title">JARVIS Remote</h1>
      <p class="pair-sub">Enter the PIN shown on your desktop</p>
      <div class="pin-inputs">
        <input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" />
        <input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" />
        <input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" />
        <input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" />
      </div>
      <button id="pair-btn" class="btn-execute" onclick="doPair()">Connect</button>
      <p id="pair-error" class="error-msg"></p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-screen" class="screen">
    <!-- Top Bar -->
    <header class="top-bar">
      <h1 class="app-title">JARVIS</h1>
      <span id="status-badge" class="status-badge disconnected">Disconnected</span>
    </header>

    <!-- Tab Content Container -->
    <div class="tab-container" id="tab-container">

      <!-- CHAT TAB -->
      <div id="tab-chat" class="tab-content active">
        <div class="chat-messages" id="chat-messages"></div>
        <div id="typing-indicator" class="typing-indicator">
          <span></span><span></span><span></span>
          <span class="typing-label">JARVIS is thinking</span>
        </div>
        <div id="recent-cmds" class="recent-cmds"></div>
        <div class="chat-input-row">
          <div class="input-pill-wrapper">
            <span class="material-symbols-outlined input-icon">terminal</span>
            <input id="chat-input" type="text" placeholder="Message JARVIS…" autocomplete="off"
                   onkeydown="if(event.key==='Enter')sendChat()" />
          </div>
          <button class="btn-send" onclick="sendChat()">
            <span class="material-symbols-outlined">keyboard_return</span>
          </button>
        </div>
        <div class="chat-actions">
          <button class="tool-chip" onclick="clearChatHistory()">Clear</button>
        </div>
      </div>

      <!-- VOICE TAB -->
      <div id="tab-voice" class="tab-content">
        <div class="voice-center">
          <div class="voice-status" id="voice-status">Tap to speak</div>
          <button id="mic-btn" class="mic-btn" onclick="toggleMic()">
            <span class="material-symbols-outlined mic-icon">mic</span>
            <div class="mic-ring"></div>
            <div class="mic-ring mic-ring-2"></div>
            <div class="mic-ring mic-ring-3"></div>
          </button>
          <div class="voice-wave" id="voice-wave">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="voice-transcript" id="voice-transcript"></div>
        </div>
      </div>

      <!-- DESKTOP TAB -->
      <div id="tab-desktop" class="tab-content">
        <div class="desktop-toolbar">
          <button class="tool-chip" onclick="refreshScreenshot()">refresh</button>
          <button class="tool-chip" onclick="toggleAutoRefresh()">autorenew</button>
          <button class="tool-chip" onclick="zoomIn()">zoom_in</button>
          <button class="tool-chip" onclick="zoomOut()">zoom_out</button>
          <button class="tool-chip" onclick="resetZoom()">aspect_ratio</button>
          <button class="tool-chip" onclick="sendKey('ctrl+c')">content_copy</button>
          <button class="tool-chip" onclick="sendKey('ctrl+v')">content_paste</button>
          <button class="tool-chip" onclick="sendKey('ctrl+z')">undo</button>
          <button class="tool-chip" onclick="sendKey('ctrl+a')">select_all</button>
          <button class="tool-chip" onclick="sendKey('alt+F4')">close</button>
          <button class="tool-chip" onclick="sendKey('super')">stadia_controller</button>
          <button class="tool-chip" onclick="sendKey('alt+tab')">swap_horiz</button>
        </div>
        <div class="desktop-view" id="desktop-view">
          <img id="desktop-img" src="" alt="Desktop" onclick="handleDesktopClick(event)" />
          <div id="desktop-placeholder" class="desktop-placeholder">
            <span class="material-symbols-outlined" style="font-size:48px;color:var(--muted)">desktop_windows</span>
            <p style="color:var(--muted);font-size:14px;margin-top:8px">Tap Refresh to see your desktop</p>
          </div>
        </div>
        <div class="desktop-keyboard-row">
          <div class="input-pill-wrapper">
            <span class="material-symbols-outlined input-icon">keyboard</span>
            <input id="desktop-type-input" type="text" placeholder="Type to send to desktop…"
                   onkeydown="if(event.key==='Enter'){sendTypeToDesktop();}" />
          </div>
          <button class="btn-send" onclick="sendTypeToDesktop()">
            <span class="material-symbols-outlined">keyboard_return</span>
          </button>
        </div>
        <div class="scroll-btns">
          <button class="tool-chip scroll-chip" onclick="sendScroll('up',5)">
            <span class="material-symbols-outlined">keyboard_arrow_up</span> Scroll Up
          </button>
          <button class="tool-chip scroll-chip" onclick="sendScroll('down',5)">
            <span class="material-symbols-outlined">keyboard_arrow_down</span> Scroll Down
          </button>
        </div>
      </div>

      <!-- TOOLS TAB -->
      <div id="tab-tools" class="tab-content">
        <div class="tools-grid">
          <button class="tool-card" onclick="sendDeviceInfo()">
            <span class="material-symbols-outlined tool-card-icon">info</span>
            <span class="tool-card-label">Device Info</span>
          </button>
          <button class="tool-card" onclick="quickTool('computer_settings',{action:'screenshot'})">
            <span class="material-symbols-outlined tool-card-icon">screenshot_monitor</span>
            <span class="tool-card-label">Screenshot</span>
          </button>
          <button class="tool-card" onclick="quickTool('computer_settings',{action:'volume_up'})">
            <span class="material-symbols-outlined tool-card-icon">volume_up</span>
            <span class="tool-card-label">Vol Up</span>
          </button>
          <button class="tool-card" onclick="quickTool('computer_settings',{action:'volume_down'})">
            <span class="material-symbols-outlined tool-card-icon">volume_down</span>
            <span class="tool-card-label">Vol Down</span>
          </button>
          <button class="tool-card" onclick="quickTool('computer_settings',{action:'mute'})">
            <span class="material-symbols-outlined tool-card-icon">volume_off</span>
            <span class="tool-card-label">Mute</span>
          </button>
          <button class="tool-card" onclick="quickTool('media_control',{action:'play'})">
            <span class="material-symbols-outlined tool-card-icon">play_arrow</span>
            <span class="tool-card-label">Play</span>
          </button>
          <button class="tool-card" onclick="quickTool('media_control',{action:'pause'})">
            <span class="material-symbols-outlined tool-card-icon">pause</span>
            <span class="tool-card-label">Pause</span>
          </button>
          <button class="tool-card" onclick="quickTool('media_control',{action:'next'})">
            <span class="material-symbols-outlined tool-card-icon">skip_next</span>
            <span class="tool-card-label">Next</span>
          </button>
          <button class="tool-card" onclick="quickTool('computer_settings',{action:'lock_screen'})">
            <span class="material-symbols-outlined tool-card-icon" style="color:var(--error)">lock</span>
            <span class="tool-card-label">Lock</span>
          </button>
          <button class="tool-card" onclick="quickTool('computer_settings',{action:'shutdown'})">
            <span class="material-symbols-outlined tool-card-icon" style="color:var(--error)">power_settings_new</span>
            <span class="tool-card-label">Shutdown</span>
          </button>
          <button class="tool-card" onclick="quickTool('computer_settings',{action:'restart'})">
            <span class="material-symbols-outlined tool-card-icon" style="color:var(--warning)">restart_alt</span>
            <span class="tool-card-label">Restart</span>
          </button>
          <button class="tool-card" onclick="quickTool('computer_settings',{action:'minimize'})">
            <span class="material-symbols-outlined tool-card-icon">minimize</span>
            <span class="tool-card-label">Minimize</span>
          </button>
          <button class="tool-card" onclick="sendDeviceInfo()">
            <span class="material-symbols-outlined tool-card-icon">devices</span>
            <span class="tool-card-label">Devices</span>
          </button>
          <button class="tool-card" onclick="quickTool('computer_settings',{action:'show_desktop'})">
            <span class="material-symbols-outlined tool-card-icon">desktop_windows</span>
            <span class="tool-card-label">Desktop</span>
          </button>
          <button class="tool-card" onclick="regeneratePin()">
            <span class="material-symbols-outlined tool-card-icon" style="color:var(--warning)">vpn_key</span>
            <span class="tool-card-label">New PIN</span>
          </button>
          <button class="tool-card" onclick="quickTool('computer_settings',{action:'brightness_up'})">
            <span class="material-symbols-outlined tool-card-icon">brightness_high</span>
            <span class="tool-card-label">Bright+</span>
          </button>
        </div>
        <div class="tool-custom">
          <p class="section-label">Custom Command</p>
          <div class="input-pill-wrapper">
            <span class="material-symbols-outlined input-icon">terminal</span>
            <input id="custom-cmd" type="text" placeholder="Ask JARVIS anything…" />
          </div>
          <button class="btn-execute" onclick="sendCustomCmd()">
            <span class="material-symbols-outlined">terminal</span> Execute
          </button>
        </div>
        <div id="tool-result" class="tool-result glass-panel"></div>
      </div>

      <!-- FILES TAB -->
      <div id="tab-files" class="tab-content">
        <div class="files-toolbar">
          <button class="tool-chip" onclick="listFiles('desktop')">desktop_windows</button>
          <button class="tool-chip" onclick="listFiles('downloads')">download</button>
          <button class="tool-chip" onclick="listFiles('documents')">description</button>
          <button class="tool-chip" onclick="listFiles('home')">home</button>
          <button class="tool-chip" onclick="triggerFileUpload()">upload_file</button>
        </div>
        <input id="file-upload-input" type="file" style="display:none" onchange="handleFileSelected(event)" />
        <div id="files-list" class="files-list">
          <div class="muted-text">Tap a folder to browse</div>
        </div>
      </div>
    </div>

    <!-- Floating Bottom Tab Bar -->
    <nav class="bottom-nav">
      <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')">
        <span class="material-symbols-outlined">forum</span>
        <span class="tab-label">Chat</span>
      </button>
      <button class="tab-btn" data-tab="voice" onclick="switchTab('voice')">
        <span class="material-symbols-outlined">mic</span>
        <span class="tab-label">Voice</span>
      </button>
      <button class="tab-btn" data-tab="desktop" onclick="switchTab('desktop')">
        <span class="material-symbols-outlined">desktop_windows</span>
        <span class="tab-label">Desktop</span>
      </button>
      <button class="tab-btn" data-tab="tools" onclick="switchTab('tools')">
        <span class="material-symbols-outlined">build</span>
        <span class="tab-label">Tools</span>
      </button>
      <button class="tab-btn" data-tab="files" onclick="switchTab('files')">
        <span class="material-symbols-outlined">folder_open</span>
        <span class="tab-label">Files</span>
      </button>
    </nav>

    <!-- Status Bar -->
    <div class="status-bar">
      <span id="ws-dot" class="ws-dot disconnected"></span>
      <span id="status-text">Disconnected</span>
      <span id="latency-indicator" class="latency-indicator"></span>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
