<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JARVIS" />
  <meta name="theme-color" content="#0d1117" />
  <title>JARVIS Remote</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- ── PAIR SCREEN ── -->
  <div id="pair-screen" class="screen active">
    <div class="pair-card">
      <div class="logo-ring">
        <svg viewBox="0 0 60 60" width="60" height="60">
          <circle cx="30" cy="30" r="28" fill="none" stroke="#1e90ff" stroke-width="2" stroke-dasharray="4 3"/>
          <circle cx="30" cy="30" r="18" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
          <circle cx="30" cy="30" r="6" fill="#1e90ff"/>
        </svg>
      </div>
      <h1 class="pair-title">JARVIS Remote</h1>
      <p class="pair-sub">Enter the PIN shown on your desktop</p>
      <div class="pin-inputs">
        <input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" />
        <input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" />
        <input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" />
        <input class="pin-digit" type="tel" maxlength="1" inputmode="numeric" />
      </div>
      <button id="pair-btn" class="btn-primary" onclick="doPair()">Connect</button>
      <p id="pair-error" class="error-msg"></p>
    </div>
  </div>

  <!-- ── MAIN APP ── -->
  <div id="app-screen" class="screen">

    <!-- Tab bar -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <span>Chat</span>
      </button>
      <button class="tab-btn" data-tab="voice" onclick="switchTab('voice')">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
        <span>Voice</span>
      </button>
      <button class="tab-btn" data-tab="desktop" onclick="switchTab('desktop')">
        <svg viewBox="0 0 24 24"><path d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H3V4h18v10z"/></svg>
        <span>Desktop</span>
      </button>
      <button class="tab-btn" data-tab="tools" onclick="switchTab('tools')">
        <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
        <span>Tools</span>
      </button>
      <button class="tab-btn" data-tab="files" onclick="switchTab('files')">
        <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
        <span>Files</span>
      </button>
    </nav>

    <!-- ── CHAT TAB ── -->
    <div id="tab-chat" class="tab-content active">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Message JARVIS…" autocomplete="off"
               onkeydown="if(event.key==='Enter')sendChat()" />
        <button class="send-btn" onclick="sendChat()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <!-- ── VOICE TAB ── -->
    <div id="tab-voice" class="tab-content">
      <div class="voice-center">
        <div class="voice-status" id="voice-status">Tap to speak</div>
        <button id="mic-btn" class="mic-btn" ontouchstart="startRecording()" ontouchend="stopRecording()"
                onmousedown="startRecording()" onmouseup="stopRecording()">
          <svg viewBox="0 0 24 24" width="48" height="48">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
          </svg>
        </button>
        <div class="voice-wave" id="voice-wave">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="voice-transcript" id="voice-transcript"></div>
      </div>
    </div>

    <!-- ── DESKTOP TAB ── -->
    <div id="tab-desktop" class="tab-content">
      <div class="desktop-toolbar">
        <button class="tool-chip" onclick="refreshScreenshot()">📷 Refresh</button>
        <button class="tool-chip" onclick="toggleAutoRefresh()">🔄 Auto</button>
        <button class="tool-chip" onclick="zoomIn()">🔍+ Zoom In</button>
        <button class="tool-chip" onclick="zoomOut()">🔍- Zoom Out</button>
        <button class="tool-chip" onclick="resetZoom()">↺ Reset</button>
        <button class="tool-chip" onclick="sendKey('ctrl+c')">Copy</button>
        <button class="tool-chip" onclick="sendKey('ctrl+v')">Paste</button>
        <button class="tool-chip" onclick="sendKey('ctrl+z')">Undo</button>
        <button class="tool-chip" onclick="sendKey('ctrl+a')">Select All</button>
        <button class="tool-chip" onclick="sendKey('alt+F4')">Close</button>
        <button class="tool-chip" onclick="sendKey('super')">Win</button>
        <button class="tool-chip" onclick="sendKey('alt+tab')">Switch</button>
      </div>
      <div class="desktop-view" id="desktop-view">
        <img id="desktop-img" src="" alt="Desktop" onclick="handleDesktopClick(event)" />
        <div id="desktop-placeholder" class="desktop-placeholder">
          <p>Tap "Refresh" to see your desktop</p>
        </div>
      </div>
      <div class="desktop-keyboard-row">
        <input id="desktop-type-input" type="text" placeholder="Type here → sends to desktop"
               onkeydown="if(event.key==='Enter'){sendTypeToDesktop();}" />
        <button class="send-btn" onclick="sendTypeToDesktop()">↵</button>
      </div>
      <div class="scroll-btns">
        <button class="tool-chip" onclick="sendScroll('up',5)">▲ Scroll Up</button>
        <button class="tool-chip" onclick="sendScroll('down',5)">▼ Scroll Down</button>
      </div>
    </div>

    <!-- ── TOOLS TAB ── -->
    <div id="tab-tools" class="tab-content">
      <div class="tools-grid">
        <button class="tool-card" onclick="sendDeviceInfo()">
          📱<span>Device Info</span>
        </button>
        <button class="tool-card" onclick="quickTool('computer_settings',{action:'screenshot'})">
          📷<span>Screenshot</span>
        </button>
        <button class="tool-card" onclick="quickTool('computer_settings',{action:'volume_up'})">
          🔊<span>Vol Up</span>
        </button>
        <button class="tool-card" onclick="quickTool('computer_settings',{action:'volume_down'})">
          🔉<span>Vol Down</span>
        </button>
        <button class="tool-card" onclick="quickTool('computer_settings',{action:'mute'})">
          🔇<span>Mute</span>
        </button>
        <button class="tool-card" onclick="quickTool('computer_settings',{action:'minimize'})">
          ⬇️<span>Minimize</span>
        </button>
        <button class="tool-card" onclick="quickTool('computer_settings',{action:'show_desktop'})">
          🖥️<span>Desktop</span>
        </button>
        <button class="tool-card" onclick="quickTool('media_control',{action:'play'})">
          ▶️<span>Play</span>
        </button>
        <button class="tool-card" onclick="quickTool('media_control',{action:'pause'})">
          ⏸️<span>Pause</span>
        </button>
        <button class="tool-card" onclick="quickTool('media_control',{action:'next'})">
          ⏭️<span>Next</span>
        </button>
        <button class="tool-card" onclick="quickTool('computer_settings',{action:'lock_screen'})">
          🔒<span>Lock</span>
        </button>
        <button class="tool-card" onclick="quickTool('computer_settings',{action:'shutdown'})">
          ⏻<span>Shutdown</span>
        </button>
        <button class="tool-card" onclick="quickTool('computer_settings',{action:'restart'})">
          🔄<span>Restart</span>
        </button>
      </div>
      <div class="tool-custom">
        <p class="section-label">Custom Command</p>
        <input id="custom-cmd" type="text" placeholder="Ask JARVIS anything…" />
        <button class="btn-primary" onclick="sendCustomCmd()">Send</button>
      </div>
      <div id="tool-result" class="tool-result"></div>
    </div>

    <!-- ── FILES TAB ── -->
    <div id="tab-files" class="tab-content">
      <div class="files-toolbar">
        <button class="tool-chip" onclick="listFiles('desktop')">🖥 Desktop</button>
        <button class="tool-chip" onclick="listFiles('downloads')">⬇ Downloads</button>
        <button class="tool-chip" onclick="listFiles('documents')">📄 Documents</button>
      </div>
      <div id="files-list" class="files-list">
        <p class="muted-text">Tap a folder to browse</p>
      </div>
    </div>

  </div><!-- /app-screen -->

  <!-- Status bar -->
  <div id="status-bar" class="status-bar">
    <span id="ws-status" class="ws-dot disconnected"></span>
    <span id="status-text">Disconnected</span>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
